<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#06090F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Alertas — Monitor HCDN</title>
  <meta name="description" content="Configurar alertas para recibir notificaciones de nuevos proyectos parlamentarios por palabra clave, tipo, comisión o bloque.">
  <link rel="canonical" href="https://hcdn.openarg.org/alertas">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Monitor HCDN">
  <meta property="og:locale" content="es_AR">
  <meta property="og:url" content="https://hcdn.openarg.org/alertas">
  <meta property="og:title" content="Alertas de Proyectos — Monitor HCDN">
  <meta property="og:description" content="Configurá alertas para seguir nuevos proyectos de la Cámara de Diputados por palabra clave, tipo, comisión o bloque.">
  <meta property="og:image" content="https://hcdn.openarg.org/assets/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Monitor HCDN — Cámara de Diputados de la Nación Argentina">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Alertas de Proyectos — Monitor HCDN">
  <meta name="twitter:description" content="Seguí nuevos proyectos de la Cámara de Diputados por palabra clave, tipo, comisión o bloque.">
  <meta name="twitter:image" content="https://hcdn.openarg.org/assets/og.png">
  <script>
    (function(){
      try {
        var t = localStorage.getItem('hcdn_theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) { document.documentElement.setAttribute('data-theme','dark'); }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido</a>
  <div id="nav-container"></div>
  <main class="main" id="main-content">
    <div class="page-header">
      <h1 data-icon="bell">Alertas de Proyectos</h1>
      <p>Configurá alertas para monitorear proyectos que te interesen. Se guardan en tu navegador.</p>
    </div>

    <!-- Create Alert -->
    <div class="alert-config">
      <div class="card-title" data-icon="plus" style="margin-bottom:var(--sp-md)">Nueva Alerta</div>
      <div class="alert-form" id="alert-form">
        <div style="flex:1;min-width:200px">
          <label for="alert-keyword">Palabra clave</label>
          <input type="text" id="alert-keyword" placeholder="ej: educación, salud, presupuesto...">
        </div>
        <div>
          <label for="alert-tipo">Tipo</label>
          <select id="alert-tipo">
            <option value="">Cualquiera</option>
            <option value="LEY">Ley</option>
            <option value="RESOLUCION">Resolución</option>
            <option value="DECLARACION">Declaración</option>
            <option value="MENSAJE">Mensaje</option>
          </select>
        </div>
        <div>
          <label for="alert-comision">Comisión</label>
          <select id="alert-comision"><option value="">Cualquiera</option></select>
        </div>
        <div>
          <label for="alert-bloque">Bloque</label>
          <select id="alert-bloque"><option value="">Cualquiera</option></select>
        </div>
        <div>
          <label aria-hidden="true">&nbsp;</label>
          <button class="btn-primary" id="btn-add-alert">Crear Alerta</button>
        </div>
      </div>
    </div>

    <!-- Active Alerts -->
    <div class="card" style="margin-bottom:var(--sp-xl)">
      <div class="card-header">
        <div class="card-title" data-icon="zap">Alertas Activas</div>
        <div class="card-subtitle" id="alerts-count">—</div>
      </div>
      <div id="active-alerts">
        <div class="empty-state" style="padding:24px"><p>No tenés alertas configuradas</p></div>
      </div>
    </div>

    <!-- Matching Projects -->
    <div id="matching-section" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)">
        <h2 class="section-title" data-icon="list">Proyectos que Coinciden</h2>
        <button class="btn-ghost btn-sm" id="btn-mark-seen">Marcar todos como vistos</button>
      </div>
      <div class="project-list" id="matching-projects"></div>
      <div class="pagination" id="matching-pagination"></div>
    </div>
  </main>
  <div id="footer-container"></div>

  <script src="js/data-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    const MATCH_PAGE_SIZE = 30;
    let matchPage = 1;
    let matchedProjects = [];

    async function populateDropdowns() {
      const [comisiones, bloques] = await Promise.all([
        DataLoader.loadComisiones(),
        DataLoader.loadBloques()
      ]);
      if (comisiones) {
        const sel = document.getElementById('alert-comision');
        comisiones.filter(c => c.proyectos > 0).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.nombre;
          opt.textContent = App.titleCase(c.nombre);
          sel.appendChild(opt);
        });
      }
      if (bloques) {
        const sel = document.getElementById('alert-bloque');
        bloques.forEach(b => {
          const opt = document.createElement('option');
          opt.value = b.nombre;
          opt.textContent = b.nombre;
          sel.appendChild(opt);
        });
      }
    }

    function renderAlerts() {
      const alerts = App.getAlerts();
      document.getElementById('alerts-count').textContent = `${alerts.length} alerta${alerts.length !== 1 ? 's' : ''}`;

      if (alerts.length === 0) {
        document.getElementById('active-alerts').innerHTML =
          '<div class="empty-state" style="padding:24px"><p>No tenés alertas configuradas</p></div>';
        document.getElementById('matching-section').style.display = 'none';
        return;
      }

      document.getElementById('active-alerts').innerHTML = `
        <div class="alert-tags">
          ${alerts.map((a, i) => {
            const parts = [];
            if (a.keyword) parts.push(`"${a.keyword}"`);
            if (a.tipo) parts.push(a.tipo);
            if (a.comision) parts.push(App.titleCase(a.comision));
            if (a.bloque) parts.push(a.bloque);
            return `<div class="alert-tag">
              ${parts.join(' · ')}
              <span class="remove" onclick="removeAlert(${i})">✕</span>
            </div>`;
          }).join('')}
        </div>
      `;

      findMatches();
    }

    async function findMatches() {
      const alerts = App.getAlerts();
      if (alerts.length === 0) return;

      const proyectos = await DataLoader.loadProyectos();
      if (!proyectos) return;

      matchedProjects = proyectos.filter(p => {
        for (const a of alerts) {
          if (App.projectMatchesAlert(p, a)) return true;
        }
        return false;
      });

      const section = document.getElementById('matching-section');
      if (matchedProjects.length === 0) {
        section.style.display = 'block';
        document.getElementById('matching-projects').innerHTML =
          '<div class="empty-state" style="padding:24px"><p>Ningún proyecto coincide con tus alertas</p></div>';
        document.getElementById('matching-pagination').innerHTML = '';
        return;
      }

      section.style.display = 'block';
      matchPage = 1;
      renderMatchPage();
    }

    function renderMatchPage() {
      const total = matchedProjects.length;
      const totalPages = Math.ceil(total / MATCH_PAGE_SIZE);
      const start = (matchPage - 1) * MATCH_PAGE_SIZE;
      const page = matchedProjects.slice(start, start + MATCH_PAGE_SIZE);

      const lastSeen = App.getLastSeen();

      document.getElementById('matching-projects').innerHTML = page.map(p => {
        const isNew = p.fecha > lastSeen;
        return `
        <div class="project-item" onclick="App.goToProject('${p.id}')" style="${isNew ? 'box-shadow:inset 3px 0 0 var(--celeste);' : ''}">
          <span class="badge ${App.badgeClass(p.tipo)}">${p.tipo}</span>
          <div>
            <div class="project-title">
              ${isNew ? '<span style="color:var(--celeste);font-size:10px;font-weight:700;margin-right:6px">NUEVO</span>' : ''}
              ${p.t}
            </div>
            <div class="project-meta">
              <span>${App.icon('user')} ${App.titleCase(p.autor)}</span>
              ${p.com ? `<span>${App.icon('folder')} ${App.titleCase(p.com)}</span>` : ''}
            </div>
          </div>
          <div class="project-date">${App.formatDate(p.fecha)}</div>
        </div>`;
      }).join('');

      // Pagination
      let html = `<span class="page-info">${App.formatNum(total)} proyectos coinciden</span>`;
      if (totalPages > 1) {
        html += `<button ${matchPage <= 1 ? 'disabled' : ''} onclick="matchGoPage(${matchPage - 1})">←</button>`;
        html += `<span class="page-info">${matchPage} / ${totalPages}</span>`;
        html += `<button ${matchPage >= totalPages ? 'disabled' : ''} onclick="matchGoPage(${matchPage + 1})">→</button>`;
      }
      document.getElementById('matching-pagination').innerHTML = html;
    }

    function matchGoPage(p) {
      matchPage = p;
      renderMatchPage();
    }

    function addAlert() {
      const keyword = document.getElementById('alert-keyword').value.trim();
      const tipo = document.getElementById('alert-tipo').value;
      const comision = document.getElementById('alert-comision').value;
      const bloque = document.getElementById('alert-bloque').value;

      if (!keyword && !tipo && !comision && !bloque) {
        alert('Especificá al menos un criterio para la alerta.');
        return;
      }

      const alerts = App.getAlerts();
      const newAlert = {};
      if (keyword) newAlert.keyword = keyword;
      if (tipo) newAlert.tipo = tipo;
      if (comision) newAlert.comision = comision;
      if (bloque) newAlert.bloque = bloque;
      alerts.push(newAlert);
      App.saveAlerts(alerts);

      // Clear form
      document.getElementById('alert-keyword').value = '';
      document.getElementById('alert-tipo').value = '';
      document.getElementById('alert-comision').value = '';
      document.getElementById('alert-bloque').value = '';

      renderAlerts();
      App.updateAlertBadge();
    }

    function removeAlert(idx) {
      const alerts = App.getAlerts();
      alerts.splice(idx, 1);
      App.saveAlerts(alerts);
      renderAlerts();
      App.updateAlertBadge();
    }

    document.getElementById('btn-add-alert').addEventListener('click', addAlert);
    document.getElementById('btn-mark-seen').addEventListener('click', () => {
      const now = new Date().toISOString().substring(0, 10);
      App.setLastSeen(now);
      renderAlerts();
      App.updateAlertBadge();
    });

    // Allow entering with enter key
    document.getElementById('alert-keyword').addEventListener('keydown', e => {
      if (e.key === 'Enter') addAlert();
    });

    // Init
    (async () => {
      await App.initGlobals();
      await populateDropdowns();
      renderAlerts();
    })();
  </script>
</body>
</html>
