<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#06090F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Detalle de Proyecto — Monitor HCDN</title>
  <meta name="description" content="Detalle completo de proyecto parlamentario: timeline de movimientos, comisiones asignadas y estado actual.">
  <link rel="canonical" href="https://hcdn.openarg.org/proyecto-detalle">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Monitor HCDN">
  <meta property="og:locale" content="es_AR">
  <meta property="og:url" content="https://hcdn.openarg.org/proyecto-detalle">
  <meta property="og:title" content="Detalle de Proyecto — Monitor HCDN">
  <meta property="og:description" content="Ficha completa de un proyecto parlamentario: autor, bloque, comisiones asignadas, estado y timeline de movimientos.">
  <meta property="og:image" content="https://hcdn.openarg.org/assets/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Monitor HCDN — Cámara de Diputados de la Nación Argentina">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Detalle de Proyecto — Monitor HCDN">
  <meta name="twitter:description" content="Ficha completa de un proyecto parlamentario: autor, comisiones, estado y movimientos.">
  <meta name="twitter:image" content="https://hcdn.openarg.org/assets/og.png">
  <script>
    (function(){
      try {
        var t = localStorage.getItem('hcdn_theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) { document.documentElement.setAttribute('data-theme','dark'); }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido</a>
  <div id="nav-container"></div>
  <main class="main" id="main-content">
    <a href="proyectos.html" class="back-link">← Volver a proyectos</a>

    <div id="detail-content">
      <div class="loading"><div class="loading-spinner"></div> Cargando proyecto...</div>
    </div>
  </main>
  <div id="footer-container"></div>

  <script src="js/data-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await App.initGlobals();

      const id = App.getParam('id');
      if (!id) {
        App.emptyState('#detail-content', { icon: 'error', isError: true, title: 'Proyecto no especificado', message: 'No se indicó qué proyecto mostrar.', actionLabel: 'Ver proyectos', actionHref: 'proyectos.html' });
        return;
      }

      const [proyectos, detalles] = await Promise.all([
        DataLoader.loadProyectos(),
        DataLoader.loadDetalles()
      ]);

      if (!proyectos) {
        App.emptyState('#detail-content', { icon: 'error', isError: true, title: 'No se pudieron cargar los datos', message: `No encontramos datos para el período ${DataLoader.getActivePeriod()}.`, actionLabel: 'Cambiar período', actionHref: 'index.html' });
        return;
      }
      const proj = proyectos.find(p => p.id === id);
      if (!proj) {
        App.emptyState('#detail-content', { icon: 'search', title: 'Proyecto no encontrado', message: `No existe un proyecto con el identificador ${id} en este período.`, actionLabel: 'Ver proyectos', actionHref: 'proyectos.html' });
        return;
      }

      document.title = `${proj.exp || proj.id} — Monitor HCDN`;

      const detail = detalles ? detalles[id] : null;
      const giros = detail ? detail.giros.sort((a, b) => (a.orden || 0) - (b.orden || 0)) : [];
      const movimientos = detail ? detail.movimientos : [];

      // Build HCDN link
      const hcdnLink = proj.exp 
        ? `https://www.hcdn.gob.ar/proyectos/proyecto.jsp?exp=${proj.exp.replace(/-/g, '-')}`
        : '';

      let html = `
        <div class="detail-header">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <span class="badge ${App.badgeClass(proj.tipo)}" style="font-size:13px;padding:5px 14px">${proj.tipo}</span>
            <span style="font-size:13px;color:var(--text-muted);font-family:var(--font-mono)">${proj.exp || proj.id}</span>
            <span class="badge" style="background:rgba(52,211,153,0.12);color:var(--success);font-size:11px">${proj.estado || 'EN TRÁMITE'}</span>
          </div>
          <h1>${proj.t}</h1>
          <div class="detail-meta">
            <div class="detail-meta-item">
              <div class="detail-meta-label">Autor/a</div>
              <div class="detail-meta-value">
                <a href="proyectos.html?autor=${encodeURIComponent(proj.autor)}">${App.titleCase(proj.autor)}</a>
              </div>
            </div>
            ${proj.bloque ? `
            <div class="detail-meta-item">
              <div class="detail-meta-label">Bloque</div>
              <div class="detail-meta-value">
                <a href="bloques.html?bloque=${encodeURIComponent(proj.bloque)}">${proj.bloque}</a>
              </div>
            </div>` : ''}
            <div class="detail-meta-item">
              <div class="detail-meta-label">Fecha de Publicación</div>
              <div class="detail-meta-value">${App.formatDate(proj.fecha)}</div>
            </div>
            <div class="detail-meta-item">
              <div class="detail-meta-label">Cámara de Origen</div>
              <div class="detail-meta-value">${proj.cam || 'Diputados'}</div>
            </div>
            ${hcdnLink ? `
            <div class="detail-meta-item">
              <div class="detail-meta-label">Ver en HCDN</div>
              <div class="detail-meta-value">
                <a href="${hcdnLink}" target="_blank" rel="noopener">Expediente oficial ↗</a>
              </div>
            </div>` : ''}
          </div>
        </div>

        <div class="grid-2">
          <!-- Comisiones giradas -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">${App.icon('folder')} Comisiones Asignadas</div>
              <div class="card-subtitle">${giros.length} comision${giros.length !== 1 ? 'es' : ''}</div>
            </div>
            ${giros.length > 0 ? `
            <div class="com-chips">
              ${giros.map(g => `
                <a href="comisiones.html?com=${encodeURIComponent(g.comision)}" class="com-chip" style="text-decoration:none">
                  <span class="order">${g.orden || '—'}</span>
                  ${App.titleCase(g.comision)}
                </a>
              `).join('')}
            </div>` : '<div class="empty-state" style="padding:24px"><p>Sin giros registrados</p></div>'}
          </div>

          <!-- Timeline de movimientos -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">${App.icon('list')} Movimientos</div>
              <div class="card-subtitle">${movimientos.length} registro${movimientos.length !== 1 ? 's' : ''}</div>
            </div>
            ${movimientos.length > 0 ? `
            <div class="timeline">
              ${movimientos.map(m => `
                <div class="timeline-item">
                  <div class="timeline-date">${m.fecha ? App.formatDate(m.fecha.substring(0, 10)) : 'Sin fecha'}</div>
                  <div class="timeline-text">${m.movimiento}</div>
                </div>
              `).join('')}
            </div>` : '<div class="empty-state" style="padding:24px"><p>Sin movimientos registrados</p></div>'}
          </div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = html;
    })();
  </script>
</body>
</html>
