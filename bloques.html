<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#242c4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Bloques — Monitor HCDN</title>
  <meta name="description" content="Bloques parlamentarios de la Cámara de Diputados: composición, productividad y proyectos por bloque.">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="nav-container"></div>
  <main class="main">
    <div class="page-header">
      <h1>Bloques Parlamentarios</h1>
      <p>Composición y actividad legislativa por bloque — Año 2025</p>
    </div>

    <div id="bloque-detail" style="display:none"></div>

    <div id="bloque-list">
      <div class="kpi-grid" id="bloque-kpis" style="margin-bottom:var(--sp-xl)"></div>

      <div class="grid-2">
        <div class="card animate-in">
          <div class="card-header">
            <div class="card-title">🏛️ Composición de la Cámara</div>
          </div>
          <div class="chart-container">
            <canvas id="chart-composicion" height="320"></canvas>
          </div>
        </div>
        <div class="card animate-in">
          <div class="card-header">
            <div class="card-title">📊 Productividad Legislativa</div>
            <div class="card-subtitle">Proyectos por diputado</div>
          </div>
          <div class="chart-container">
            <canvas id="chart-productividad" height="320"></canvas>
          </div>
        </div>
      </div>

      <div class="section-title" style="margin-top:var(--sp-lg)"><span class="emoji">📋</span> Todos los Bloques</div>
      <div class="ranking-list" id="all-bloques"></div>
    </div>
  </main>
  <div id="footer-container"></div>

  <script src="js/data-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav-container').innerHTML = App.navHTML();
    document.getElementById('footer-container').innerHTML = App.footerHTML();
    App.initNav();

    const BLOQUE_COLORS = [
      '#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444',
      '#06b6d4','#d4a027','#ec4899','#84cc16','#f97316',
      '#6366f1','#14b8a6','#f43f5e','#a855f7','#22d3ee',
      '#eab308','#fb923c','#4ade80','#f472b6','#818cf8'
    ];

    async function showBloqueDetail(bloqueName) {
      const [bloques, composicion, proyectos] = await Promise.all([
        DataLoader.loadBloques(),
        DataLoader.loadBloquesComp(),
        DataLoader.loadProyectos()
      ]);

      const bloque = bloques.find(b => b.nombre === bloqueName);
      const miembros = composicion[bloqueName] || [];
      const bloqueProjects = proyectos.filter(p => p.bloque === bloqueName);

      document.getElementById('bloque-list').style.display = 'none';
      const el = document.getElementById('bloque-detail');
      el.style.display = 'block';

      // Top autores in this bloque
      const autorCount = {};
      bloqueProjects.forEach(p => {
        autorCount[p.autor] = (autorCount[p.autor] || 0) + 1;
      });
      const topAutores = Object.entries(autorCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

      el.innerHTML = `
        <a href="bloques.html" class="back-link">← Volver a bloques</a>
        <div class="detail-header">
          <h1>${bloqueName}</h1>
          <div class="detail-meta">
            <div class="detail-meta-item">
              <div class="detail-meta-label">Diputados</div>
              <div class="detail-meta-value">${bloque?.cantidad || miembros.length}</div>
            </div>
            <div class="detail-meta-item">
              <div class="detail-meta-label">Presidente</div>
              <div class="detail-meta-value">${bloque ? App.titleCase(bloque.presidente_apellido + ', ' + bloque.presidente_nombre) : '—'}</div>
            </div>
            <div class="detail-meta-item">
              <div class="detail-meta-label">Proyectos 2025</div>
              <div class="detail-meta-value">${App.formatNum(bloqueProjects.length)}</div>
            </div>
            <div class="detail-meta-item">
              <div class="detail-meta-label">Proy./Diputado</div>
              <div class="detail-meta-value">${(bloque?.cantidad ? (bloqueProjects.length / bloque.cantidad).toFixed(1) : '—')}</div>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title">👥 Integrantes</div>
              <div class="card-subtitle">${miembros.length} diputados</div>
            </div>
            <div class="ranking-list">
              ${miembros.sort((a, b) => a.apellido.localeCompare(b.apellido)).map(m => `
                <div class="ranking-item" onclick="window.location.href='proyectos.html?autor=${encodeURIComponent(m.apellido + ', ' + m.nombres)}'">
                  <div class="ranking-name" style="flex:2">${App.titleCase(m.apellido + ', ' + m.nombres)}</div>
                  <div class="ranking-value" style="color:var(--text-muted);font-size:12px">${m.distrito}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">✍️ Más Activos del Bloque</div>
            </div>
            ${topAutores.length > 0 ? `
            <div class="ranking-list">
              ${topAutores.map(([autor, count], i) => `
                <div class="ranking-item" onclick="window.location.href='proyectos.html?autor=${encodeURIComponent(autor)}'">
                  <div class="ranking-pos">${i + 1}</div>
                  <div class="ranking-name">${App.titleCase(autor)}</div>
                  <div class="ranking-value">${count}</div>
                </div>
              `).join('')}
            </div>` : '<div class="empty-state" style="padding:24px"><p>Sin proyectos registrados para este bloque</p></div>'}
          </div>
        </div>

        ${bloqueProjects.length > 0 ? `
        <div style="margin-top:var(--sp-lg)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)">
            <h2 class="section-title"><span class="emoji">📋</span> Últimos Proyectos</h2>
            <a href="proyectos.html?bloque=${encodeURIComponent(bloqueName)}" style="font-size:14px;font-weight:500;color:var(--text-accent)">Ver todos →</a>
          </div>
          <div class="project-list">
            ${bloqueProjects.slice(0, 20).map(p => `
              <div class="project-item" onclick="App.goToProject('${p.id}')">
                <span class="badge ${App.badgeClass(p.tipo)}">${p.tipo}</span>
                <div>
                  <div class="project-title">${p.t}</div>
                  <div class="project-meta">
                    <span>👤 ${App.titleCase(p.autor)}</span>
                    <span>📄 ${p.exp || p.id}</span>
                  </div>
                </div>
                <div class="project-date">${App.formatDate(p.fecha)}</div>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      `;
    }

    (async () => {
      const bloqueParam = App.getParam('bloque');
      if (bloqueParam) {
        await showBloqueDetail(bloqueParam);
        return;
      }

      const bloques = await DataLoader.loadBloques();
      if (!bloques) return;

      // KPI cards
      const totalDips = bloques.reduce((s, b) => s + b.cantidad, 0);
      const totalProj = bloques.reduce((s, b) => s + b.proyectos, 0);
      document.getElementById('bloque-kpis').innerHTML = `
        <div class="kpi-card animate-in">
          <div class="kpi-label">Bloques</div>
          <div class="kpi-value">${bloques.length}</div>
        </div>
        <div class="kpi-card animate-in">
          <div class="kpi-label">Diputados</div>
          <div class="kpi-value">${totalDips}</div>
        </div>
        <div class="kpi-card animate-in">
          <div class="kpi-label">Proyectos (con bloque)</div>
          <div class="kpi-value">${App.formatNum(totalProj)}</div>
        </div>
        <div class="kpi-card animate-in">
          <div class="kpi-label">Bloque más grande</div>
          <div class="kpi-value" style="font-size:20px">${bloques[0]?.nombre || '—'}</div>
          <div class="kpi-sub">${bloques[0]?.cantidad || 0} diputados</div>
        </div>
      `;

      // Composicion donut
      new Chart(document.getElementById('chart-composicion'), {
        type: 'doughnut',
        data: {
          labels: bloques.map(b => b.nombre),
          datasets: [{
            data: bloques.map(b => b.cantidad),
            backgroundColor: BLOQUE_COLORS.slice(0, bloques.length),
            borderWidth: 0, hoverOffset: 8
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '55%',
          onClick: (e, els) => {
            if (els.length) {
              const idx = els[0].index;
              App.goToBloque(bloques[idx].nombre);
            }
          },
          plugins: {
            legend: { position: 'right', labels: { color: '#8899b4', padding: 8, usePointStyle: true, pointStyleWidth: 8, font: { size: 10 } } }
          }
        }
      });

      // Productividad (proyectos per diputado)
      const withProj = bloques.filter(b => b.proyectos > 0 && b.cantidad > 0);
      withProj.sort((a, b) => (b.proyectos / b.cantidad) - (a.proyectos / a.cantidad));
      
      new Chart(document.getElementById('chart-productividad'), {
        type: 'bar',
        data: {
          labels: withProj.map(b => b.nombre.length > 25 ? b.nombre.substring(0, 22) + '…' : b.nombre),
          datasets: [{
            label: 'Proy./Diputado',
            data: withProj.map(b => +(b.proyectos / b.cantidad).toFixed(1)),
            backgroundColor: withProj.map((_, i) => BLOQUE_COLORS[i % BLOQUE_COLORS.length] + '55'),
            borderColor: withProj.map((_, i) => BLOQUE_COLORS[i % BLOQUE_COLORS.length]),
            borderWidth: 1, borderRadius: 4,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { color: '#556a8a' } },
            y: { grid: { display: false }, ticks: { color: '#8899b4', font: { size: 11 } } }
          }
        }
      });

      // Full list
      const maxQ = bloques[0]?.cantidad || 1;
      document.getElementById('all-bloques').innerHTML = bloques.map((b, i) => `
        <div class="ranking-item" onclick="App.goToBloque('${b.nombre.replace(/'/g, "\\'")}')">
          <div class="ranking-pos">${i + 1}</div>
          <div style="width:12px;height:12px;border-radius:50%;background:${BLOQUE_COLORS[i % BLOQUE_COLORS.length]}"></div>
          <div class="ranking-name">${b.nombre}</div>
          <div class="ranking-bar-wrapper"><div class="ranking-bar" style="width:${(b.cantidad / maxQ * 100).toFixed(1)}%;background:${BLOQUE_COLORS[i % BLOQUE_COLORS.length]}"></div></div>
          <div class="ranking-value">${b.cantidad} <span style="color:var(--text-muted);font-size:11px">dip.</span></div>
          <div class="ranking-value">${b.proyectos} <span style="color:var(--text-muted);font-size:11px">proy.</span></div>
        </div>
      `).join('');
    })();
  </script>
</body>
</html>
