<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Monitor HCDN - Selección de Período</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      background-color: var(--bg-body);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .landing-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .landing-logo {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }

    .landing-title {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text-strong);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .landing-desc {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .period-btn {
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
       transition: all 0.2s ease;
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .period-btn:hover {
      border-color: var(--text-accent);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .period-btn .year {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-strong);
      font-family: 'Outfit', sans-serif;
    }

    .period-btn .label {
      font-size: 14px;
      color: var(--text-muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="landing-card">
    <span class="landing-logo">🏛️</span>
    <h1 class="landing-title">Monitor HCDN</h1>
    <p class="landing-desc">Plataforma analítica y visualizador de datos abiertos operativos de la Honorable Cámara de Diputados de la Nación. Seleccione un período legislativo para ingresar.</p>
    
    <div class="period-grid" id="landing-periods">
      <!-- Injected by JS -->
    </div>
  </div>

  <script src="js/data-loader.js"></script>
  <script>
    (async () => {
      // Load available periods from periods.json
      await DataLoader.init();
      const periods = DataLoader.periods || [];
      const grid = document.getElementById('landing-periods');
      
      if (periods.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1">No hay períodos disponibles en los datos.</p>';
        return;
      }

      // Sort descending (newest first)
      periods.sort((a, b) => b.year.localeCompare(a.year)).forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'period-btn';
        btn.innerHTML = `
          <span class="year">${p.year}</span>
          <span class="label">Período Legislativo ${p.periodo}</span>
        `;
        btn.onclick = () => {
          DataLoader.setActivePeriod(p.year);
          window.location.href = 'dashboard.html';
        };
        grid.appendChild(btn);
      });
    })();
  </script>
</body>
</html>
